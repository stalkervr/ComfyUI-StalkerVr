# ComfyUI-StalkerVr Configuration

# Enable global loging (for develop)
logging:
  global_enabled: true

  # Control logging for specific node classes here
  node_settings:
    WanVideoLoraCivitAIDownloader: true
    WanVideoLoraPairCreator: true
    WanVideoLoraPairSelect: true
    WanVideoEnhanceMotionAdvancedKJ: true
    WanVideoEnhanceMotionAdvanced: true

    LoraLoaderExtended: true
    LoraLoaderExtendedBatch: true

    JsonFieldValueExtractor: true
    JsonFieldRemover: true
    JsonFieldReplaceExtend: true
    JsonPromptToTextPromptConverter: true
    JsonSerializeObject: true
    JsonDeserializeObject: true
    JsonFormat: true
    JsonMinify: true
    JsonPathLoader: true
    JsonBuilder: true
    JsonPairInput: false

    StringBuilder: true
    StringWrapper: true
    StringNormalize: true

    ImageGridCropper: true
    ImageCropper: true
    ImageRatioResizer: true
    ImageGetSize: true
    ImageDesiredResolution: true

    ImagesLoadWithMetadata: true
    ImageLoadWithMetadata: true
    ImageSaveWithMetadata: true

    CurrentDateTime: true